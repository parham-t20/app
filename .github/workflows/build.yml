name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zlib1g-dev \
            libncurses5-dev \
            libgdbm-dev \
            libnss3-dev \
            libssl-dev \
            libreadline-dev \
            libffi-dev \
            libsqlite3-dev \
            wget \
            libbz2-dev \
            openjdk-11-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zip \
            unzip \
            cmake \
            lld

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip setuptools
          pip3 install --upgrade buildozer cython==0.29.33

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug 2>&1 | tail -n 500

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: bin/*.apk
